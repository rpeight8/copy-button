<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copy</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f0f;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 2rem;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.75rem;
        width: 100%;
        max-width: 640px;
      }

      .btn {
        padding: 0.75rem 1.25rem;
        background: #1c1c1c;
        color: #e0e0e0;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn:focus {
        outline: 2px solid #777;
        outline-offset: 3px;
      }
      .btn:focus:not(:focus-visible) {
        outline: none;
      }
      .btn:hover:not(:disabled) {
        background: #282828;
        border-color: #666;
      }
      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .btn[data-s="ok"] {
        border-color: #3a7a3a;
        color: #7dda7d;
      }
      .btn[data-s="err"] {
        border-color: #7a3a3a;
        color: #da7d7d;
      }

      .sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
    </style>
  </head>

        /* ── clipboard helpers ───────────────────────────────── */

        function legacyCopy(text) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.setAttribute("aria-hidden", "true");
          ta.style.cssText =
            "position:fixed;top:0;left:0;opacity:0;pointer-events:none";
          document.body.appendChild(ta);
          try {
            if (/ipad|iphone/i.test(navigator.userAgent)) {
              var range = document.createRange();
              range.selectNodeContents(ta);
              var sel = window.getSelection();
              if (sel) {
                sel.removeAllRanges();
                sel.addRange(range);
              }
              ta.setSelectionRange(0, text.length);
            } else {
              ta.select();
            }
            return document.execCommand("copy");
          } catch (e) {
            return false;
          } finally {
            document.body.removeChild(ta);
          }
        }

        function copyText(text, done) {
          if (
            typeof navigator !== "undefined" &&
            navigator.clipboard &&
            typeof navigator.clipboard.writeText === "function" &&
            window.isSecureContext
          ) {
            navigator.clipboard.writeText(text).then(
              function () {
                done(true);
              },
              function () {
                done(legacyCopy(text));
              }
            );
          } else {
            done(legacyCopy(text));
          }
        }

        /* ── per-button state ────────────────────────────────── */

        function announce(text) {
          srMsg.textContent = "";
          srMsg.textContent = text;
        }

        function setState(btn, title, state) {
          clearTimeout(btn._timer);

          if (!state) {
            btn.removeAttribute("data-s");
            btn.disabled = false;
            btn.textContent = title;
            btn.setAttribute("aria-label", "Copy " + title);
            return;
          }

          btn.setAttribute("data-s", state);
          btn.disabled = true;

          var ok = state === "ok";
          var label = ok ? title + " copied!" : "Copy failed — try again";
          btn.textContent = ok ? "Copied!" : "Failed";
          btn.setAttribute("aria-label", label);
          announce(label);

          btn._timer = setTimeout(function () {
            setState(btn, title, "");
          }, 2000);
        }

        /* ── render ──────────────────────────────────────────── */

        BUTTONS.forEach(function (item) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn";
          btn.setAttribute("role", "listitem");
          btn.textContent = item.title;
          btn.setAttribute("aria-label", "Copy " + item.title);

          btn.addEventListener("click", function () {
            copyText(item.copyData, function (ok) {
              setState(btn, item.title, ok ? "ok" : "err");
            });
          });

          grid.appendChild(btn);
        });

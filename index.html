<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copy</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f0f;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 2rem;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.75rem;
        width: 100%;
        max-width: 640px;
      }

      .btn {
        padding: 0.75rem 1.25rem;
        background: #1c1c1c;
        color: #e0e0e0;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn:focus {
        outline: 2px solid #777;
        outline-offset: 3px;
      }
      .btn:focus:not(:focus-visible) {
        outline: none;
      }
      .btn:hover:not(:disabled) {
        background: #282828;
        border-color: #666;
      }
      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .btn[data-s="ok"] {
        border-color: #3a7a3a;
        color: #7dda7d;
      }
      .btn[data-s="err"] {
        border-color: #7a3a3a;
        color: #da7d7d;
      }

      .btn-runaway {
        --runaway-accent: #ffc078;
        --runaway-accent-dim: rgba(255, 192, 120, 0.45);
        position: fixed;
        z-index: 40;
        left: 0;
        top: 0;
        cursor: crosshair;
        overflow: visible;
        isolation: isolate;
        padding: 0.85rem 1.45rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 0.78rem;
        color: #ffe8cc;
        background: linear-gradient(
          155deg,
          #2f2822 0%,
          #1c1916 48%,
          #141210 100%
        );
        border: 1px solid rgba(255, 192, 120, 0.65);
        border-radius: 999px;
        box-shadow: 0 4px 28px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 210, 150, 0.12) inset,
          0 0 24px var(--runaway-accent-dim);
        transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
      }

      .btn-runaway:not(.btn-runaway--caught) {
        animation: runaway-idle-pulse 2.4s ease-in-out infinite;
      }

      @keyframes runaway-idle-pulse {
        0%,
        100% {
          box-shadow: 0 4px 28px rgba(0, 0, 0, 0.55),
            0 0 0 1px rgba(255, 210, 150, 0.12) inset,
            0 0 18px rgba(255, 192, 120, 0.22);
        }
        50% {
          box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5),
            0 0 0 1px rgba(255, 220, 170, 0.2) inset,
            0 0 40px rgba(255, 180, 100, 0.42);
        }
      }

      .btn-runaway::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        z-index: -1;
        opacity: 0;
        transform: scale(1);
        box-shadow: 0 0 0 2px rgba(255, 210, 150, 0.85);
      }

      .btn-runaway.btn-runaway--caught {
        color: #fff8f0;
        border-color: rgba(255, 235, 200, 0.95);
        animation: runaway-caught-pop 0.88s cubic-bezier(0.34, 1.45, 0.64, 1)
          forwards;
      }

      .btn-runaway.btn-runaway--caught::after {
        z-index: 1;
        animation: runaway-caught-ring 0.9s ease-out forwards;
      }

      @keyframes runaway-caught-pop {
        0% {
          transform: scale(1) rotate(0deg);
          filter: brightness(1);
        }
        18% {
          transform: scale(1.12) rotate(-2.5deg);
          filter: brightness(1.25);
        }
        38% {
          transform: scale(0.97) rotate(2deg);
          filter: brightness(1.15);
        }
        58% {
          transform: scale(1.06) rotate(-1deg);
          filter: brightness(1.1);
        }
        100% {
          transform: scale(1) rotate(0deg);
          filter: brightness(1);
        }
      }

      @keyframes runaway-caught-ring {
        0% {
          opacity: 1;
          transform: scale(1);
          box-shadow: 0 0 0 2px rgba(255, 220, 160, 0.9),
            0 0 28px rgba(255, 190, 100, 0.55);
        }
        100% {
          opacity: 0;
          transform: scale(2.35);
          box-shadow: 0 0 0 1px rgba(255, 220, 160, 0),
            0 0 0 rgba(255, 190, 100, 0);
        }
      }

      .btn-runaway:hover:not(:disabled):not(.btn-runaway--caught) {
        background: linear-gradient(
          155deg,
          #3a322b 0%,
          #242019 50%,
          #181614 100%
        );
        border-color: rgba(255, 210, 150, 0.85);
        color: #fff0e0;
      }

      .btn-runaway.btn-runaway--static {
        position: relative;
        left: auto;
        top: auto;
        cursor: pointer;
      }

      @media (prefers-reduced-motion: reduce) {
        .btn-runaway:not(.btn-runaway--caught) {
          animation: none;
          box-shadow: 0 4px 28px rgba(0, 0, 0, 0.55),
            0 0 0 1px rgba(255, 210, 150, 0.12) inset,
            0 0 28px rgba(255, 192, 120, 0.3);
        }

        .btn-runaway.btn-runaway--caught {
          animation: runaway-caught-pop-subtle 0.45s ease-out forwards;
        }

        .btn-runaway.btn-runaway--caught::after {
          animation: none;
          opacity: 0;
        }

        @keyframes runaway-caught-pop-subtle {
          0%,
          100% {
            transform: scale(1);
            filter: brightness(1);
          }
          50% {
            transform: scale(1.04);
            filter: brightness(1.12);
          }
        }
      }

      .sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="grid" role="list"></div>
    <span
      id="sr-msg"
      class="sr"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></span>

    <script>
      (function () {
        "use strict";

        /* ── data ────────────────────────────────────────────── */
        var RUNAWAY_LABEL = "Варвара, нажми на меня";

        var BUTTONS = [
          {
            title: "VLESS",
            copyData:
              "vless://7a1fe3d3-e1e1-40d9-8b6a-a28f9dd46bfc@195.63.129.162:443?type=tcp&encryption=none&security=reality&pbk=fNMpwhQTbF6cLW_VOjxvmWNyEzUCUNAHC__GuQ8cNh0&fp=chrome&sni=www.bilibili.com&sid=8f&spx=%2F&flow=xtls-rprx-vision#GL-VLESS-ssauk85u",
          },
          {
            title: "VLESS-WS",
            copyData:
              "vless://870e7d21-d68a-4aeb-bc81-b7047714ccf1@195.63.129.162:26569?type=ws&encryption=none&path=%2F&host=bilibili.com&security=none#GL-VLESS-WS-lrjlee2t",
          },
          {
            title: "SS",
            copyData:
              "ss://MjAyMi1ibGFrZTMtYWVzLTI1Ni1nY206elNJNjc4Uk1IUjZydyt3dlFORjM3MXBTbFZoY3pld2JTYXdzVDdEWktITT06emZxNGVYS2IwOE5oN3RVNXFjSStNU0M4UWFqV053Tk91ek9vdVdQMnBCQT0@195.63.129.162:46602?type=tcp#GL-SS-8tyxzz58",
          },
          {
            title: "VLESS-XHTTP",
            copyData:
              "vless://ae7fcf4c-207e-4a81-a274-eac0007b95a3@195.63.129.162:50249?type=xhttp&encryption=none&path=%2F&host=&mode=auto&security=reality&pbk=ooGjSfX9rtK53GQChJusbeCl9eHcq7I9BORHYl1bH3s&fp=chrome&sni=www.bilibili.com&sid=4f&spx=%2F#GL-VLESS-XHTTP-3py3w7eu",
          },
          {
            title: "VLESS-GRPC-NS",
            copyData:
              "vless://ece76f90-59f2-49bd-b489-dcbbe7a01bb1@195.63.129.162:36665?type=grpc&encryption=none&serviceName=&authority=&mode=multi&security=none#GL-VLESS-GRPC-NS-2xh1678l",
          },
        ];

        /* ── refs ────────────────────────────────────────────── */
        var grid = document.getElementById("grid");
        var srMsg = document.getElementById("sr-msg");

        /* ── clipboard helpers ───────────────────────────────── */

        function legacyCopy(text) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.setAttribute("aria-hidden", "true");
          ta.style.cssText =
            "position:fixed;top:0;left:0;opacity:0;pointer-events:none";
          document.body.appendChild(ta);
          try {
            if (/ipad|iphone/i.test(navigator.userAgent)) {
              var range = document.createRange();
              range.selectNodeContents(ta);
              var sel = window.getSelection();
              if (sel) {
                sel.removeAllRanges();
                sel.addRange(range);
              }
              ta.setSelectionRange(0, text.length);
            } else {
              ta.select();
            }
            return document.execCommand("copy");
          } catch (e) {
            return false;
          } finally {
            document.body.removeChild(ta);
          }
        }

        function copyText(text, done) {
          if (
            typeof navigator !== "undefined" &&
            navigator.clipboard &&
            typeof navigator.clipboard.writeText === "function" &&
            window.isSecureContext
          ) {
            navigator.clipboard.writeText(text).then(
              function () {
                done(true);
              },
              function () {
                done(legacyCopy(text));
              }
            );
          } else {
            done(legacyCopy(text));
          }
        }

        /* ── per-button state ────────────────────────────────── */

        function announce(text) {
          srMsg.textContent = "";
          srMsg.textContent = text;
        }

        function setState(btn, title, state) {
          clearTimeout(btn._timer);

          if (!state) {
            btn.removeAttribute("data-s");
            btn.disabled = false;
            btn.textContent = title;
            btn.setAttribute("aria-label", "Copy " + title);
            return;
          }

          btn.setAttribute("data-s", state);
          btn.disabled = true;

          var ok = state === "ok";
          var label = ok ? title + " copied!" : "Copy failed — try again";
          btn.textContent = ok ? "Copied!" : "Failed";
          btn.setAttribute("aria-label", label);
          announce(label);

          btn._timer = setTimeout(function () {
            setState(btn, title, "");
          }, 2000);
        }

        /* ── render ──────────────────────────────────────────── */

        BUTTONS.forEach(function (item) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn";
          btn.setAttribute("role", "listitem");
          btn.textContent = item.title;
          btn.setAttribute("aria-label", "Copy " + item.title);

          btn.addEventListener("click", function () {
            copyText(item.copyData, function (ok) {
              setState(btn, item.title, ok ? "ok" : "err");
            });
          });

          grid.appendChild(btn);
        });

        /* ── runaway button ─────────────────────────────────── */

        (function () {
          var runBtn = document.createElement("button");
          runBtn.type = "button";
          runBtn.className = "btn btn-runaway";
          runBtn.textContent = RUNAWAY_LABEL;
          runBtn.setAttribute(
            "aria-label",
            RUNAWAY_LABEL + " — moves away from the pointer"
          );

          var reduceMotion =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          if (reduceMotion) {
            runBtn.classList.add("btn-runaway--static");
            runBtn.setAttribute("role", "listitem");
            grid.appendChild(runBtn);
          } else {
            runBtn.style.visibility = "hidden";
            document.body.appendChild(runBtn);
          }

          function placeRunaway(x, y) {
            var m = 10;
            var w = runBtn.offsetWidth;
            var h = runBtn.offsetHeight;
            var left = Math.min(
              Math.max(m, x - w / 2),
              window.innerWidth - w - m
            );
            var top = Math.min(
              Math.max(m, y - h / 2),
              window.innerHeight - h - m
            );
            runBtn.style.left = left + "px";
            runBtn.style.top = top + "px";
            runBtn.style.visibility = "";
          }

          function fleeFrom(px, py) {
            if (reduceMotion) return;
            var rect = runBtn.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;
            var dx = cx - px;
            var dy = cy - py;
            var len = Math.hypot(dx, dy);
            var threshold = Math.max(140, rect.width * 1.8);
            if (len >= threshold) return;
            if (len < 0.5) {
              dx = 1;
              dy = 0;
              len = 1;
            }
            var push = 95 * (1 - len / threshold);
            var ux = dx / len;
            var uy = dy / len;
            var ncx = cx + ux * push;
            var ncy = cy + uy * push;
            placeRunaway(ncx, ncy);
          }

          if (!reduceMotion) {
            requestAnimationFrame(function () {
              placeRunaway(window.innerWidth * 0.62, window.innerHeight * 0.42);
            });

            document.addEventListener("mousemove", function (e) {
              fleeFrom(e.clientX, e.clientY);
            });

            document.addEventListener(
              "touchmove",
              function (e) {
                var t = e.touches[0];
                if (t) fleeFrom(t.clientX, t.clientY);
              },
              { passive: true }
            );

            window.addEventListener("resize", function () {
              var r = runBtn.getBoundingClientRect();
              placeRunaway(r.left + r.width / 2, r.top + r.height / 2);
            });
          }

          runBtn.addEventListener("click", function () {
            announce("Nice catch.");
            runBtn.classList.remove("btn-runaway--caught");
            void runBtn.offsetWidth;
            runBtn.classList.add("btn-runaway--caught");
            clearTimeout(runBtn._catchTimer);
            runBtn._catchTimer = setTimeout(function () {
              runBtn.classList.remove("btn-runaway--caught");
            }, 920);
          });
        })();
      })();
    </script>
  </body>
</html>
